<!DOCTYPE html>
<html lang="hu">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>FloraQuiz</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🌿 FloraQuiz</h1>

        <p class="subtitle">
            Ismerd fel a növényeket!
        </p>

        <div id="categoryTitle"></div>

        <div id="scoreBoard">

            ✔ <span id="correctCount">0</span>

            /

            <span id="totalCount">0</span>

        </div>

        <div id="question"></div>

        <img
            id="plantImage"
            src=""
            alt="Növény">

        <div id="answers"></div>

        <div id="answer" class="hidden">

            <h2 id="hungarian"></h2>

            <h3 id="latin"></h3>

        </div>

        <button id="backButton"
            class="backButton"
            onclick="location.href='index.html'">

            ← Vissza a főmenübe

        </button>

    </div>

</div>

<script src="js/storage.js"></script>
<script src="js/quiz.js"></script>

</body>

</html>
