<!DOCTYPE html>
<html lang="hu">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FloraQuiz - Kvíz</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <!-- Fejléc -->

        <h1>🌿 FloraQuiz</h1>

        <p id="categoryTitle"></p>

        <!-- Pontszám -->

        <div id="scoreBoard">

            <span id="correctCount">0</span>

            /

            <span id="totalCount">0</span>

        </div>

        <!-- Kérdés -->

        <h2 id="question"></h2>

        <!-- Kép -->

        <img
            id="plantImage"
            src=""
            alt="Növény"
        >

        <!-- Válaszok -->

        <div id="answers">

        </div>

        <!-- Megoldás -->

        <div id="answer" class="hidden">

            <h2 id="hungarian"></h2>

            <h3 id="latin"></h3>

        </div>

        <!-- Következő -->

        <button
            id="nextButton"
            class="hidden">

            Következő →

        </button>

        <br><br>

        <button
            class="backButton"
            onclick="location.href='index.html'">

            ← Vissza a főmenübe

        </button>

    </div>

</div>

<script src="js/quiz.js"></script>

</body>

</html>
