<!DOCTYPE html>
<html lang="hu">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FloraQuiz</title>

    <p class="subtitle">
        FloraQuiz v4.0
    </p>
    
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🌿 FloraQuiz</h1>

        <p class="subtitle">
            Tanuld meg Magyarország növényeit!
        </p>

        <h2>Kategória</h2>

        <div class="buttonGroup">

            <button onclick="selectCategory('trees')">
                🌳 Magyarország fái
            </button>

            <button onclick="selectCategory('wildflowers')">
                🌼 Vadvirágok
            </button>

            <button onclick="selectCategory('herbs')">
                🌱 Gyógynövények
            </button>

            <button onclick="selectCategory('ornamentals')">
                🌵 Dísznövények
            </button>

        </div>

        <h2>Kvíz mód</h2>

        <div class="buttonGroup">

            <button onclick="startQuiz('image')">
                📷 Kép → Latin név
            </button>

            <button onclick="startQuiz('hungarian')">
                🇭🇺 Magyar → Latin
            </button>

            <button onclick="startQuiz('latin')">
                🌿 Latin → Magyar
            </button>

            <button onclick="startQuiz('mixed')">
                🔀 Vegyes
            </button>

            <button onclick="resetLearning()">
                🗑 Tanulási statisztika törlése
            </button>

        </div>

    </div>

</div>

<script src="js/app.js"></script>

</body>

</html>
