<!DOCTYPE html>
<html lang="hu">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>FloraQuiz</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🌿 FloraQuiz</h1>

        <p class="subtitle">
            Ismerd fel Magyarország növényeit!
        </p>

        <div class="menu">

            <button onclick="startQuiz('image')">
                📷 Kép → Latin név
            </button>

            <button onclick="startQuiz('hungarian')">
                🇭🇺 Magyar → Latin
            </button>

            <button onclick="startQuiz('latin')">
                🌿 Latin → Magyar
            </button>

            <button onclick="startQuiz('mixed')">
                🔀 Vegyes
            </button>

        </div>

        <hr>

        <h2>Kategóriák</h2>

        <div class="menu">

            <button onclick="setCategory('trees')">
                🌳 Magyarország fái
            </button>

            <button onclick="setCategory('wildflowers')">
                🌼 Vadvirágok
            </button>

            <button onclick="setCategory('herbs')">
                🌱 Gyógynövények
            </button>

            <button onclick="setCategory('ornamentals')">
                🌵 Dísznövények
            </button>

        </div>

        <hr>

        <div id="scoreBoard">

            ✔ <span id="correctCount">0</span>

            /

            <span id="totalCount">0</span>

        </div>

    </div>

</div>

<script src="js/storage.js"></script>
<script src="js/app.js"></script>

</body>

</html>
