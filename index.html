<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloraQuiz</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1>🌿 FloraQuiz</h1>

    <p>Tanuld meg a növényeket képek alapján!</p>

<div class="menu">

    <h2>Növénycsoport</h2>

    <button id="treesBtn">🌳 Magyarország fái</button>

    <button id="flowersBtn">🌼 Vadvirágok</button>

    <button id="herbsBtn">🌱 Gyógynövények</button>

    <button id="ornamentalBtn">🌵 Dísznövények</button>

    <hr>

    <h2>Kvíz mód</h2>

    <button onclick="startQuiz('image')">
        📷 Kép alapján
    </button>

    <button onclick="startQuiz('hungarian')">
        🇭🇺 Magyar név alapján
    </button>

    <button onclick="startQuiz('latin')">
        🌿 Latin név alapján
    </button>

    <button onclick="startQuiz('mixed')">
        🔀 Vegyes
    </button>

</div>
</div>

<script src="js/app.js"></script>

</body>
</html>
